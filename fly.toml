# fly.toml for infiquiz-frontend — the PUBLIC origin.
#
# In the backend-mediated auth model the browser only ever talks to THIS app
# (same-origin). next.config.ts rewrites proxy `/api/*` to the backend over
# Fly's private 6PN network via BACKEND_INTERNAL_URL below.
#
# ⚠️ PREREQUISITES before this can actually deploy (not done yet):
#   1. Fix the pre-existing route-group collision `(beforeLogin)` vs
#      `(afterLogin)` (both resolve to `/`) — `pnpm build` fails until then.
#   2. Add a production build/runtime: set `output: 'standalone'` in
#      next.config.ts and add a Dockerfile that runs the standalone server,
#      OR configure a Fly Next.js builder. (No Dockerfile exists yet.)
#   3. Create the app: `fly apps create infiquiz-frontend` (or `fly launch`).
# Verify the schema/flags against current Fly docs before first deploy.

app = 'infiquiz-frontend'
primary_region = 'nrt'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '3000'
  # Backend reached over Fly private networking (6PN). NOT public.
  # Backend listens on its fly.toml internal_port = 3000 (NOT the local dev 4000).
  BACKEND_INTERNAL_URL = 'http://infiquiz-server.internal:3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
