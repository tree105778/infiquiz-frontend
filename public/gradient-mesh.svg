<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" width="1440" height="600" preserveAspectRatio="xMidYMid slice">
  
  <defs>
    <filter id="meshBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="80"></feGaussianBlur>
    </filter>
    <linearGradient id="baseGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5e9d4"></stop>
      <stop offset="22%" stop-color="#f5d7b3"></stop>
      <stop offset="45%" stop-color="#c8b8f3"></stop>
      <stop offset="68%" stop-color="#b9b9f9"></stop>
      <stop offset="86%" stop-color="#f96bee"></stop>
      <stop offset="100%" stop-color="#ea2261"></stop>
    </linearGradient>
  </defs>

  
  <rect width="1440" height="600" fill="url(#baseGradient)"></rect>

  
  <g filter="url(#meshBlur)" opacity="0.85">
    <ellipse cx="180" cy="320" rx="280" ry="220" fill="#f5e9d4"></ellipse>
    <ellipse cx="420" cy="220" rx="240" ry="200" fill="#f5d7b3"></ellipse>
    <ellipse cx="640" cy="340" rx="260" ry="220" fill="#c8b8f3"></ellipse>
    <ellipse cx="860" cy="200" rx="280" ry="200" fill="#9c8bf2"></ellipse>
    <ellipse cx="1080" cy="340" rx="280" ry="220" fill="#665efd"></ellipse>
    <ellipse cx="1240" cy="200" rx="240" ry="200" fill="#f96bee"></ellipse>
    <ellipse cx="1380" cy="380" rx="260" ry="220" fill="#ea2261"></ellipse>
  </g>

  
  <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="60%" stop-color="#ffffff" stop-opacity="0"></stop>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="1"></stop>
  </linearGradient>
  <rect width="1440" height="600" fill="url(#bottomFade)"></rect>
</svg>